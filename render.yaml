version: 1
services:
  - type: web
    name: cardvault-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn cardvault.wsgi:application --log-file -
    envVars:
      - key: DEBUG
        value: False
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: JUSTTCG_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cardvault-db
          property: connectionString

  - type: pgsql
    name: cardvault-db
    plan: free
    databaseName: cardvault
    user: cardvault

  - type: worker
    name: cardvault-worker
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A cardvault worker --loglevel=info
    envVars:
      - key: DJANGO_SECRET_KEY
        fromService:
          name: cardvault-web
          type: web
          property: env.DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: cardvault-db
          property: connectionString

  - type: worker
    name: cardvault-beat
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A cardvault beat --loglevel=info
    envVars:
      - key: DJANGO_SECRET_KEY
        fromService:
          name: cardvault-web
          type: web
          property: env.DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: cardvault-db
          property: connectionString
