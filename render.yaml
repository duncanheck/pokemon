version: "1"

databases:
  - name: cardvault-db
    plan: free
    databaseName: cardvault
    user: cardvault

services:
  - type: redis
    name: cardvault-redis
    plan: free
    ipAllowList: []

  - type: web
    name: cardvault-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn cardvault.wsgi:application --log-file -
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "cardvault-yqzz.onrender.com"
      - key: SECRET_KEY
        generateValue: true
      - key: JUSTTCG_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cardvault-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cardvault-redis
          type: redis
          property: connectionString

  - type: worker
    name: cardvault-worker
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A cardvault worker --loglevel=info
    envVars:
      - key: SECRET_KEY
        fromService:
          name: cardvault-web
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: cardvault-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cardvault-redis
          type: redis
          property: connectionString

  - type: worker
    name: cardvault-beat
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A cardvault beat --loglevel=info
    envVars:
      - key: SECRET_KEY
        fromService:
          name: cardvault-web
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: cardvault-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cardvault-redis
          type: redis
          property: connectionString
