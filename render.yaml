version: "1"

databases:
  - name: cardvault-db
    plan: free
    databaseName: cardvault
    user: cardvault

services:
  # Redis service (MISSING - required for Celery)
  - type: redis
    name: cardvault-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

  # Web service
  - type: web
    name: cardvault-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn cardvault.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 2 --log-file -
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: cardvault-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cardvault-redis
          type: redis
          property: connectionString
      - key: JUSTTCG_API_KEY
        sync: false

  # Celery worker
  - type: worker
    name: cardvault-worker
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A cardvault worker --loglevel=info
    envVars:
      - key: SECRET_KEY
        fromService:
          name: cardvault-web
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: cardvault-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cardvault-redis
          type: redis
          property: connectionString

  # Celery beat scheduler
  - type: worker
    name: cardvault-beat
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A cardvault beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: SECRET_KEY
        fromService:
          name: cardvault-web
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: cardvault-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cardvault-redis
          type: redis
          property: connectionString
