{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block layout_class %}container py-5{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="stat-card p-4">
      <h3 class="fw-bold mb-1">Reset password</h3>
      <p class="text-muted small mb-4">We'll send a reset link to your email.</p>
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label class="form-label small fw-semibold" for="{{ field.id_for_label }}">{{ field.label }}</label>
            <input type="email" name="{{ field.html_name }}" id="{{ field.id_for_label }}"
                   class="form-control bg-dark border-secondary text-light" autocomplete="email">
          </div>
        {% endfor %}
        <button type="submit" class="btn btn-warning w-100 fw-semibold">Send Reset Link</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
