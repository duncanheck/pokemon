{% extends "base.html" %}
{% block title %}Confirm Email{% endblock %}
{% block layout_class %}container py-5{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="stat-card p-4 text-center">
      <i class="bi bi-envelope-check fs-1 text-warning mb-3 d-block"></i>
      <h3 class="fw-bold">Confirm your email</h3>
      <p class="text-muted">Please confirm that <strong>{{ confirmation.email_address.email }}</strong> is your email address.</p>
      <form method="post">
        {% csrf_token %}
        <button class="btn btn-warning fw-semibold px-4" type="submit">Confirm</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
